<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔍 浏览器调试工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 30px 0; border-bottom: 1px solid #333; margin-bottom: 30px; }
    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .controls { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 217, 255, 0.3); }
    .btn-primary { background: linear-gradient(135deg, #00d9ff, #0099cc); color: white; }
    .btn-success { background: linear-gradient(135deg, #00ff88, #00cc6a); color: #1a1a2e; }
    .btn-danger { background: linear-gradient(135deg, #ff4757, #ff3344); color: white; }
    .btn-secondary { background: #333; color: #eee; border: 1px solid #555; }
    .main-grid { display: grid; grid-template-columns: 300px 1fr 300px; gap: 20px; margin-top: 20px; }
    @media (max-width: 1200px) {
      .main-grid { grid-template-columns: 280px 1fr; }
      .panel:last-child { grid-column: 1 / -1; }
    }
    .panel {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .panel h2 { font-size: 1.3em; margin-bottom: 15px; color: #00d9ff; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .browser-list { list-style: none; }
    .browser-item {
      background: rgba(0, 217, 255, 0.1);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s;
      border-left: 3px solid #00d9ff;
    }
    .browser-item:hover { background: rgba(0, 217, 255, 0.2); transform: translateX(5px); }
    .browser-item.active { background: rgba(0, 217, 255, 0.3); border-left-width: 5px; }
    .browser-item .browser-id { font-weight: bold; color: #00ff88; }
    .browser-item .browser-type { font-size: 0.85em; color: #888; }
    .viewport {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      min-height: 500px;
      position: relative;
    }
    .viewport img { 
      width: 100%; 
      height: auto; 
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      -khtml-user-drag: none;
      -moz-user-drag: none;
      -o-user-drag: none;
      user-drag: none;
    }
    .viewport-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 500px;
      color: #666;
      font-size: 1.2em;
    }
    .console-panel {
      max-height: 500px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
    .console-log { padding: 5px 10px; margin-bottom: 5px; border-radius: 4px; border-left: 3px solid; }
    .console-log.log { background: rgba(0, 217, 255, 0.1); border-left-color: #00d9ff; }
    .console-log.error { background: rgba(255, 71, 87, 0.1); border-left-color: #ff4757; }
    .console-log.warn { background: rgba(255, 193, 7, 0.1); border-left-color: #ffc107; }
    .url-bar { display: flex; gap: 10px; margin-bottom: 15px; }
    .url-bar input {
      flex: 1;
      padding: 10px 15px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
      font-size: 14px;
    }
    .url-bar input:focus { outline: none; border-color: #00d9ff; }
    .toolbar {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      flex-wrap: wrap;
    }
    .toolbar-btn {
      padding: 8px 16px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #2a2a3e;
      color: #eee;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .toolbar-btn:hover { background: #3a3a4e; border-color: #00d9ff; }
    .toolbar-btn.active { background: linear-gradient(135deg, #00d9ff, #0099cc); border-color: #00d9ff; color: white; }
    .toolbar-divider { width: 1px; background: #444; margin: 0 5px; }
    .viewport.interactive { cursor: crosshair; position: relative; }
    .viewport.interactive:hover { box-shadow: 0 0 20px rgba(0, 217, 255, 0.3); }
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid #333;
      margin-top: 20px;
      font-size: 0.9em;
      color: #888;
    }
    .status-indicator { display: flex; align-items: center; gap: 8px; }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00ff88;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .script-editor {
      width: 100%;
      height: 100px;
      background: #1a1a2e;
      border: 1px solid #444;
      border-radius: 8px;
      color: #eee;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 10px;
      resize: vertical;
    }
    .script-editor:focus { outline: none; border-color: #00d9ff; }
    .empty-state { text-align: center; padding: 50px; color: #666; }
    .empty-state h3 { margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔍 浏览器调试工具</h1>
      <p>基于 Node.js + Playwright 的可视化远程浏览器调试</p>
    </header>

    <div class="controls">
      <button class="btn-primary" onclick="launchBrowser('chromium')">🚀 启动 Chromium</button>
      <button class="btn-primary" onclick="launchBrowser('firefox')">🦊 启动 Firefox</button>
      <button class="btn-primary" onclick="launchBrowser('webkit')">🌐 启动 WebKit</button>
      <button class="btn-secondary" onclick="refreshBrowsers()">🔄 刷新列表</button>
      <div style="display:flex;gap:10px;">
        <label style="display:flex;align-items:center;gap:8px;background:#333;padding:10px 16px;border-radius:8px;cursor:pointer;">
          <input type="checkbox" id="headlessToggle" style="width:18px;height:18px;cursor:pointer;">
          <span style="color:#eee;font-size:14px;">🪟 有头</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#00d9ff,#0099cc);padding:10px 16px;border-radius:8px;cursor:pointer;" title="仅 Chromium 有效">
          <input type="checkbox" id="screencastToggle" checked style="width:18px;height:18px;cursor:pointer;">
          <span style="color:#fff;font-size:14px;font-weight:600;">⚡ CDP 加速</span>
        </label>
      </div>
    </div>

    <div class="main-grid">
      <div class="panel">
        <h2>📦 浏览器实例</h2>
        <ul class="browser-list" id="browserList">
          <div class="empty-state"><h3>暂无浏览器</h3><p>点击上方按钮启动浏览器</p></div>
        </ul>
        <div id="browserControls" style="display: none; margin-top: 15px;">
          <button class="btn-danger" onclick="closeBrowser()" style="width: 100%;">❌ 关闭选中浏览器</button>
        </div>
        
        <!-- 标签页管理面板（隐藏，选择浏览器后显示） -->
        <div id="tabsPanel" style="display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
            <h2 style="margin:0;border:none;padding:0;font-size:1.2em;color:#00d9ff;">📑 标签页</h2>
            <button class="btn-success" onclick="newTab()" style="padding:6px 12px;font-size:13px;">➕ 新建</button>
          </div>
          <ul class="browser-list" id="tabsList" style="max-height:200px;overflow-y:auto;">
            <div class="empty-state"><p>暂无标签页</p></div>
          </ul>
        </div>
      </div>

      <div class="panel">
        <h2>🖥️ 浏览器视图</h2>
        <div class="url-bar">
          <input type="text" id="urlInput" placeholder="输入网址，例如：https://example.com">
          <button class="btn-success" onclick="navigate()">访问</button>
        </div>
        
        <div class="toolbar">
          <button class="toolbar-btn active" id="btnView" onclick="setTool('view')" title="查看模式">👁️ 查看</button>
          <button class="toolbar-btn" id="btnMouse" onclick="setTool('mouse')" title="鼠标模式（点击/拖拉选择）">🖱️ 鼠标</button>
          <button class="toolbar-btn" id="btnKeyboard" onclick="setTool('keyboard')" title="键盘模式">⌨️ 键盘</button>
          <div class="toolbar-divider"></div>
          <button class="toolbar-btn" onclick="copyFromBrowser()" title="从浏览器复制">📋 复制</button>
          <button class="toolbar-btn" onclick="pasteToBrowser()" title="粘贴到浏览器">📌 粘贴</button>
          <button class="toolbar-btn" onclick="selectAllInBrowser()" title="全选">✋ 全选</button>
          <div class="toolbar-divider"></div>
          <button class="toolbar-btn" onclick="takeScreenshot()" title="截图">📸 截图</button>
          <button class="toolbar-btn" onclick="refreshPage()" title="刷新页面">🔄 刷新</button>
        </div>
        
        <div id="keyboardInputBox" style="display: none; margin: 10px 0;">
          <input type="text" id="keyboardInput" placeholder="输入文字后按回车发送..." style="width: 100%; padding: 10px; border: 1px solid #444; border-radius: 8px; background: #1a1a2e; color: #eee; font-size: 14px;">
        </div>
        
        <div class="viewport" id="viewport">
          <div class="viewport-placeholder">请先选择或启动一个浏览器</div>
        </div>
        <div class="controls" style="margin-top: 15px;">
          <button class="btn-secondary" onclick="toggleScriptEditor()">⚡ 执行脚本</button>
        </div>
        <textarea class="script-editor" id="scriptEditor" placeholder="输入 JavaScript 代码..." style="display: none;"></textarea>
      </div>

      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
          <h2 style="margin:0;border:none;padding:0;">📝 控制台日志</h2>
          <button class="btn-secondary" onclick="clearConsole()" style="padding:6px 12px;font-size:13px;">🗑️ 清除日志</button>
        </div>
        <div class="console-panel" id="consolePanel"><div class="empty-state"><p>暂无日志</p></div></div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-indicator"><div class="status-dot"></div><span>服务器连接正常</span></div>
      <div id="statusInfo">就绪</div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    let currentBrowserId = null;
    let socket = null;
    let currentTool = 'view'; // view, mouse, select, keyboard
    let viewportImg = null;
    let viewportRect = null;
    
    // 拖拉选择状态
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragCurrentX = 0;
    let dragCurrentY = 0;
    let dragStartTime = 0; // 记录按下时间，用于判断点击/拖拉

    function initSocket() {
      try {
        socket = io(window.location.origin, {
          transports: ['websocket', 'polling'],
          reconnection: true,
          reconnectionAttempts: 5,
          reconnectionDelay: 1000
        });
        
        socket.on('connect', () => { console.log('已连接到服务器:', socket.id); updateStatus('已连接'); });
        socket.on('disconnect', () => { console.log('与服务器断开连接'); updateStatus('连接断开'); });
        socket.on('connect_error', (error) => { console.error('Socket.IO 连接错误:', error); updateStatus('连接错误：' + error.message); });
        
        socket.on('console-log', (data) => { console.log('收到控制台日志:', data); addConsoleLog(data.type, data.text); });
        socket.on('page-error', (data) => { console.log('收到页面错误:', data); addConsoleLog('error', data.message); });
        
        socket.on('browser-closed', (data) => {
          console.log('浏览器已关闭:', data);
          if (data.browserId === currentBrowserId) {
            currentBrowserId = null;
            stopFrameStream();
            document.getElementById('viewport').innerHTML = '<div class="viewport-placeholder">浏览器已关闭</div>';
            document.getElementById('browserControls').style.display = 'none';
            document.getElementById('tabsPanel').style.display = 'none';
          }
          refreshBrowsers();
        });

        socket.on('browser-event', (data) => {
          console.log('浏览器事件:', data);
          if (data.type === 'start') {
            addSystemLog('browser-start', data.browserId, data.browserType, data.screencast ? 'CDP 加速' : '截图模式');
          } else if (data.type === 'stop') {
            addSystemLog('browser-stop', data.browserId, `${data.pageCount} 个标签页`);
          }
        });

        socket.on('browser-stopped', (data) => {
          console.log('浏览器已停止:', data);
          if (data.browserId === currentBrowserId) {
            currentBrowserId = null;
            stopFrameStream();
            document.getElementById('viewport').innerHTML = '<div class="viewport-placeholder">浏览器已停止</div>';
            document.getElementById('browserControls').style.display = 'none';
            document.getElementById('tabsPanel').style.display = 'none';
          }
          refreshBrowsers();
        });

        socket.on('page-event', (data) => {
          console.log('页面事件:', data);
          if (data.type === 'load') {
            addSystemLog('page-load', data.browserId, `${data.title || ''} - ${data.url}`);
          } else if (data.type === 'close') {
            addSystemLog('page-close', data.browserId, data.url);
          } else if (data.type === 'new-tab') {
            addSystemLog('page-new', data.browserId, `${data.title} - ${data.url}`);
          } else if (data.type === 'manual-close') {
            addSystemLog('page-manual-close', data.browserId, `标签页 ${data.tabIndex + 1}`);
          } else if (data.type === 'navigate') {
            addSystemLog('page-navigate', data.browserId, `${data.title || '加载中...'} - ${data.url}`);
          }
          // 自动更新标签页列表
          if (data.browserId === currentBrowserId) {
            loadTabs();
          }
        });

        socket.on('tabs-updated', (data) => {
          console.log('标签页已更新:', data);
          if (data.browserId === currentBrowserId) {
            loadTabs();
          }
        });

        socket.on('tab-switched', (data) => {
          console.log('标签页已切换:', data);
          if (data.browserId === currentBrowserId) {
            loadTabs();
          }
        });

        socket.on('frame', (data) => {
          if (data.browserId === currentBrowserId && data.frame) {
            const mode = data.mode || 'unknown';
            const size = (data.frame.length / 1024).toFixed(1);
            console.log(`收到帧 [${mode}]:`, data.browserId, `${size} KB`);
            updateFrame(data.frame);
          }
        });
      } catch (error) {
        console.error('初始化 Socket.IO 失败:', error);
        updateStatus('Socket.IO 初始化失败');
      }
    }

    function updateFrame(base64Data) {
      console.log('更新画面帧，数据长度:', base64Data.length);
      const viewport = document.getElementById('viewport');
      let img = viewport.querySelector('img');
      
      if (!img) {
        console.log('创建新 img 元素');
        viewport.innerHTML = `<img src="data:image/jpeg;base64,${base64Data}" id="viewportImage" style="width:100%;height:auto;display:block;user-select:none;pointer-events:auto;" draggable="false" ondragstart="return false;">`;
        viewportImg = document.getElementById('viewportImage');
        if (viewportImg) {
          console.log('绑定鼠标事件');
          viewportImg.addEventListener('click', handleViewportClick);
          viewportImg.addEventListener('mousedown', handleViewportMouseDown);
          viewportImg.addEventListener('mousemove', handleViewportMouseMove);
          viewportImg.addEventListener('mouseup', handleViewportMouseUp);
          viewportImg.addEventListener('mouseleave', handleViewportMouseLeave);
          viewportImg.addEventListener('dragstart', (e) => { e.preventDefault(); return false; });
          viewportImg.addEventListener('dragend', (e) => { e.preventDefault(); return false; });
          viewportImg.onload = () => { console.log('第一帧画面加载完成'); updateStatus('实时画面传输中 - ' + currentBrowserId); };
          viewportImg.onerror = (e) => { console.error('图片加载失败:', e); };
        }
        updateViewportRect();
      } else {
        img.src = `data:image/jpeg;base64,${base64Data}`;
      }
    }

    function stopFrameStream() {
      if (socket && currentBrowserId) {
        socket.emit('leave-browser', currentBrowserId);
      }
    }

    async function launchBrowser(browserType) {
      try {
        const headless = !document.getElementById('headlessToggle').checked;
        const screencast = document.getElementById('screencastToggle').checked;
        
        const modeText = browserType === 'chromium' 
          ? (screencast ? 'CDP 加速' : '截图模式') 
          : '兼容模式';
        
        updateStatus(`正在启动浏览器... (${headless ? '无头' : '有头'}, ${modeText})`);
        
        const response = await fetch(`${API_BASE}/api/browser/launch`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ browserType, headless, screencast })
        });
        const result = await response.json();
        if (result.success) {
          console.log(`浏览器已启动：${result.browserId}`);
          selectBrowser(result.browserId);
          refreshBrowsers();
          updateStatus(`已启动 ${browserType} (${result.screencast ? '⚡ CDP 10 FPS' : '📸 截图 2 FPS'})`);
        } else {
          alert('启动失败：' + result.error);
        }
      } catch (error) {
        console.error('启动浏览器失败:', error);
        alert('启动失败：' + error.message);
      }
    }

    async function refreshBrowsers() {
      try {
        const response = await fetch(`${API_BASE}/api/browsers`);
        const result = await response.json();
        const browserList = document.getElementById('browserList');
        if (result.browsers.length === 0) {
          browserList.innerHTML = '<div class="empty-state"><h3>暂无浏览器</h3><p>点击上方按钮启动浏览器</p></div>';
          document.getElementById('browserControls').style.display = 'none';
          document.getElementById('tabsPanel').style.display = 'none';
        } else {
          browserList.innerHTML = result.browsers.map(b => `
            <li class="browser-item ${b.id === currentBrowserId ? 'active' : ''}" onclick="selectBrowser('${b.id}')">
              <div class="browser-id">${b.id}</div>
              <div class="browser-type">
                ${b.type} 
                ${b.connected ? '🟢' : '🔴'}
                ${b.screencast ? '<span style="background:linear-gradient(135deg,#00d9ff,#0099cc);padding:2px 6px;border-radius:4px;font-size:11px;margin-left:6px;">⚡CDP</span>' : ''}
              </div>
            </li>
          `).join('');
          if (currentBrowserId) {
            document.getElementById('browserControls').style.display = 'block';
            document.getElementById('tabsPanel').style.display = 'block';
            await loadTabs();
          }
        }
      } catch (error) {
        console.error('获取浏览器列表失败:', error);
      }
    }

    // 加载标签页列表
    async function loadTabs() {
      if (!currentBrowserId) return;
      
      try {
        console.log('加载标签页列表...');
        const response = await fetch(`${API_BASE}/api/browser/${currentBrowserId}/tabs`);
        const result = await response.json();
        
        console.log('标签页响应:', result);
        
        if (result.success) {
          renderTabs(result.tabs, result.activeTabIndex);
        } else {
          console.error('加载标签页失败:', result.error);
        }
      } catch (error) {
        console.error('加载标签页失败:', error);
      }
    }

    // 渲染标签页列表
    function renderTabs(tabs, activeTabIndex) {
      const tabsList = document.getElementById('tabsList');
      
      if (!tabs || tabs.length === 0) {
        tabsList.innerHTML = '<div class="empty-state"><p>暂无标签页</p></div>';
        return;
      }
      
      console.log('渲染标签页:', tabs, '激活索引:', activeTabIndex);
      
      tabsList.innerHTML = tabs.map((tab, index) => {
        const isActive = index === activeTabIndex;
        const title = tab.title && tab.title.length > 0 ? (tab.title.length > 25 ? tab.title.substring(0, 25) + '...' : tab.title) : 'Untitled';
        const url = tab.url && tab.url.length > 0 ? (tab.url.length > 35 ? tab.url.substring(0, 35) + '...' : tab.url) : 'about:blank';
        
        return `
          <li class="browser-item ${isActive ? 'active' : ''}" style="padding:8px 10px;margin-bottom:6px;cursor:pointer;" onclick="switchTab(${index})">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div style="flex:1;overflow:hidden;">
                <div style="font-weight:600;color:${isActive ? '#00ff88' : '#eee'};font-size:13px;">${isActive ? '📍 ' : ''}${title}</div>
                <div style="font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${url}</div>
              </div>
              <button class="btn-danger" onclick="event.stopPropagation();closeTab(${index})" style="padding:4px 8px;font-size:11px;margin-left:8px;">❌</button>
            </div>
          </li>
        `;
      }).join('');
    }

    // 切换标签页
    async function switchTab(tabIndex) {
      if (!currentBrowserId) return;
      
      try {
        updateStatus(`正在切换标签页...`);
        const response = await fetch(`${API_BASE}/api/browser/${currentBrowserId}/tabs/${tabIndex}/switch`, {
          method: 'POST'

    // 复制到本地剪贴板

    // 下载文本文件
    function downloadText(text, timestamp) {
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      const safeTimestamp = timestamp.replace(/[:/]/g, '-');
      link.download = `clipboard-${safeTimestamp}.txt`;
      link.click();
      URL.revokeObjectURL(link.href);
      showToast('✅ 已保存为文本文件');
    }

    // HTML 转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // JS 字符串转义
    function escapeJs(text) {
      return text.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '\\r');
    }

    // 显示提示消息
    function showToast(message) {
      const existing = document.querySelector('.toast-message');

      const toast = document.createElement('div');
      toast.className = 'toast-message';
      toast.style.cssText = `
        position:fixed;
        bottom:30px;
        left:50%;
        transform:translateX(-50%);
        background:linear-gradient(135deg,#00d9ff,#0099cc);
        color:white;
        padding:12px 24px;
        border-radius:8px;
        font-size:14px;
        font-weight:600;
        z-index:10001;
        box-shadow:0 5px 20px rgba(0,217,255,0.4);
        animation:toastFadeIn 0.3s ease;
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'toastFadeOut 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }

    const style = document.createElement('style');
    style.textContent = `

        from { opacity: 0; transform: translateX(-50%) translateY(20px); }
        to { opacity: 1; transform: translateX(-50%) translateY(0); }
      }
      @keyframes toastFadeOut {
        from { opacity: 1; transform: translateX(-50%) translateY(0); }
        to { opacity: 0; transform: translateX(-50%) translateY(20px); }
      }
    `;
    document.head.appendChild(style);

    async function handleViewportClick(event) {
      // 这个函数现在由 handleViewportMouseUp 调用，不再检查 tool
      if (!currentBrowserId) return;
      if (!viewportRect) updateViewportRect();
      
      // 获取点击相对于 viewport 容器的坐标
      const clickX = event.clientX - viewportRect.left;
      const clickY = event.clientY - viewportRect.top;
      
      // 获取图片实际显示尺寸（考虑缩放）
      const img = document.getElementById('viewportImage');
      if (!img) return;
      
      const imgRect = img.getBoundingClientRect();
      const imgDisplayWidth = imgRect.width;
      const imgDisplayHeight = imgRect.height;
      
      // 计算图片在容器中的偏移
      const imgOffsetX = imgRect.left - viewportRect.left;
      const imgOffsetY = imgRect.top - viewportRect.top;
      
      // 确保点击在图片范围内
      if (clickX < imgOffsetX || clickX > imgOffsetX + imgDisplayWidth ||
          clickY < imgOffsetY || clickY > imgOffsetY + imgDisplayHeight) {
        console.log('点击不在图片范围内');
        return;
      }
      
      // 计算相对于图片的点击位置（0-1 之间）
      const relativeX = (clickX - imgOffsetX) / imgDisplayWidth;
      const relativeY = (clickY - imgOffsetY) / imgDisplayHeight;
      
      // 浏览器 viewport 尺寸（1280x720）
      const browserWidth = 1280;
      const browserHeight = 720;
      
      // 转换为浏览器实际坐标
      const browserX = Math.round(relativeX * browserWidth);
      const browserY = Math.round(relativeY * browserHeight);
      
      console.log(`点击：显示尺寸=${imgDisplayWidth}x${imgDisplayHeight}, 相对位置=(${relativeX.toFixed(3)}, ${relativeY.toFixed(3)}), 浏览器坐标=(${browserX}, ${browserY})`);
      
      try {
        updateStatus(`正在执行点击... (${browserX}, ${browserY})`);
        const response = await fetch(`${API_BASE}/api/browser/${currentBrowserId}/click`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ x: browserX, y: browserY, button: 'left', clickCount: 1 })
        });
        const result = await response.json();
        if (result.success) {
          updateFrame(result.screenshot);
          updateStatus(`已点击：(${browserX}, ${browserY})`);
          // 添加点击截图日志
          addClickLog(result.screenshot, browserX, browserY);
        } else {
          alert('点击失败：' + result.error);
        }
      } catch (error) {
        console.error('点击失败:', error);
        alert('点击失败：' + error.message);
      }
    }

    // 鼠标按下 - 发送 mousedown 事件
    async function handleViewportMouseDown(event) {
      if (!currentBrowserId) return;
      
      // 只在鼠标模式处理
      if (currentTool !== 'mouse') return;
      if (event.button !== 0) return; // 只处理左键
      
      // 阻止默认拖拽行为
      event.preventDefault();
      event.stopPropagation();
      
      isDragging = true;
      dragStartTime = Date.now(); // 记录按下时间
      
      if (!viewportRect) updateViewportRect();
      const img = document.getElementById('viewportImage');
      if (!img) return;
      
      const imgRect = img.getBoundingClientRect();
      const clickX = event.clientX - viewportRect.left;
      const clickY = event.clientY - viewportRect.top;
      const imgOffsetX = imgRect.left - viewportRect.left;
      const imgOffsetY = imgRect.top - viewportRect.top;
      
      // 计算相对于图片的位置
      const relativeX = (clickX - imgOffsetX) / imgRect.width;
      const relativeY = (clickY - imgOffsetY) / imgRect.height;
      dragStartX = Math.round(relativeX * 1280);
      dragStartY = Math.round(relativeY * 720);
      dragCurrentX = dragStartX;
      dragCurrentY = dragStartY;
      
      console.log(`鼠标按下：(${dragStartX}, ${dragStartY})`);
      
      // 立即发送 mousedown 事件到浏览器
      try {
        await fetch(`${API_BASE}/api/browser/${currentBrowserId}/mousedown`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ x: dragStartX, y: dragStartY, button: 'left' })
        });
        console.log('mousedown 已发送');
      } catch (error) {
        console.error('鼠标按下失败:', error);
      }
    }

    // 鼠标移动 - 发送 mousemove 事件
    async function handleViewportMouseMove(event) {
      if (!currentBrowserId) return;
      if (!viewportRect) updateViewportRect();
      
      const img = document.getElementById('viewportImage');
      if (!img) return;
      
      const imgRect = img.getBoundingClientRect();
      const clickX = event.clientX - viewportRect.left;
      const clickY = event.clientY - viewportRect.top;
      const imgOffsetX = imgRect.left - viewportRect.left;
      const imgOffsetY = imgRect.top - viewportRect.top;
      
      // 计算相对位置
      const relativeX = (clickX - imgOffsetX) / imgRect.width;
      const relativeY = (clickY - imgOffsetY) / imgRect.height;
      const browserX = Math.round(relativeX * 1280);
      const browserY = Math.round(relativeY * 720);
      
      // 如果在拖拉（按下后移动）
      if (isDragging && currentTool === 'mouse') {
        dragCurrentX = browserX;
        dragCurrentY = browserY;
        updateStatus(`选择中... (${dragStartX}, ${dragStartY}) → (${browserX}, ${browserY})`);
        
        // 发送 mousemove 事件到浏览器
        try {
          await fetch(`${API_BASE}/api/browser/${currentBrowserId}/mousemove`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ x: browserX, y: browserY })
          });
        } catch (error) {
          console.error('鼠标移动失败:', error);
        }
      } else {
        // 未按下时，更新状态栏显示当前鼠标位置
        updateStatus(`鼠标位置：(${browserX}, ${browserY})`);
      }
    }

    // 鼠标抬起 - 发送 mouseup，判断是否需要 click
    async function handleViewportMouseUp(event) {
      if (currentTool !== 'mouse' || !currentBrowserId) return;
      if (!isDragging) return;
      
      // 阻止默认行为
      event.preventDefault();
      event.stopPropagation();
      
      isDragging = false;
      
      const dragDuration = Date.now() - dragStartTime;
      const hasMoved = Math.abs(dragCurrentX - dragStartX) > 5 || Math.abs(dragCurrentY - dragStartY) > 5;
      
      console.log(`鼠标抬起，时长：${dragDuration}ms, 移动距离：${hasMoved ? '是' : '否'}`);
      
      if (!viewportRect) updateViewportRect();
      const img = document.getElementById('viewportImage');
      if (!img) return;
      
      const imgRect = img.getBoundingClientRect();
      const clickX = event.clientX - viewportRect.left;
      const clickY = event.clientY - viewportRect.top;
      const imgOffsetX = imgRect.left - viewportRect.left;
      const imgOffsetY = imgRect.top - viewportRect.top;
      
      const relativeX = (clickX - imgOffsetX) / imgRect.width;
      const relativeY = (clickY - imgOffsetY) / imgRect.height;
      const browserX = Math.round(relativeX * 1280);
      const browserY = Math.round(relativeY * 720);
      
      // 总是先发送 mouseup
      try {
        await fetch(`${API_BASE}/api/browser/${currentBrowserId}/mouseup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ x: browserX, y: browserY, button: 'left' })
        });
        console.log('mouseup 已发送');
      } catch (error) {
        console.error('mouseup 失败:', error);
      }
      
      // 快速点击（< 200ms 且无移动）才发送 click 事件
      if (dragDuration < 200 && !hasMoved) {
        console.log('判断为快速点击，发送 click 事件');
        updateStatus(`正在执行点击... (${browserX}, ${browserY})`);
        
        try {
          const response = await fetch(`${API_BASE}/api/browser/${currentBrowserId}/click`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ x: browserX, y: browserY, button: 'left', clickCount: 1 })
          });
          const result = await response.json();
          
          if (result.success) {
            updateFrame(result.screenshot);
            updateStatus(`已点击：(${browserX}, ${browserY})`);
            addClickLog(result.screenshot, browserX, browserY);
          }
        } catch (error) {
          console.error('点击失败:', error);
        }
      } else if (hasMoved) {
        // 有移动 = 选择，检查是否有选中文本
        console.log('判断为选择操作');
        try {
          const response = await fetch(`${API_BASE}/api/browser/${currentBrowserId}/mouseup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ x: browserX, y: browserY, button: 'left' })
          });
          const result = await response.json();
          
          if (result.success && result.selectedText && result.selectedText.length > 0) {
            updateStatus(`已选择 ${result.selectedLength} 字符`);
            showToast(`✅ 已选择 ${result.selectedLength} 字符`);
            await navigator.clipboard.writeText(result.selectedText);
            addClipboardLog('copy', result.selectedText);
            showToast(`✅ 已自动复制到剪贴板`);
          }
        } catch (error) {
          console.error('选择失败:', error);
        }
      } else {
        // 长按但无移动
        updateStatus('鼠标已释放');
        showToast('✅ 鼠标已释放');
      }
    }

    // 鼠标离开视图区域 - 取消选择
    function handleViewportMouseLeave(event) {
      if (isDragging) {
        isDragging = false;
        updateStatus('选择已取消');
      }
    }

    function setTool(tool) {
      currentTool = tool;
      document.querySelectorAll('.toolbar-btn').forEach(btn => btn.classList.remove('active'));
      const btnId = `btn${tool.charAt(0).toUpperCase() + tool.slice(1)}`;
      const btn = document.getElementById(btnId);
      if (btn) btn.classList.add('active');
      
      const viewport = document.getElementById('viewport');
      const keyboardInputBox = document.getElementById('keyboardInputBox');
      
      if (tool === 'mouse') {
        viewport.classList.add('interactive');
        viewport.style.cursor = 'pointer';
        keyboardInputBox.style.display = 'none';
        updateStatus('鼠标模式：点击执行操作，或拖拉选择文本');
      } else if (tool === 'keyboard') {
        viewport.classList.remove('interactive');
        viewport.style.cursor = 'default';
        keyboardInputBox.style.display = 'block';
        document.getElementById('keyboardInput').focus();
        updateStatus('键盘模式：输入文字发送到浏览器');
      } else {
        viewport.classList.remove('interactive');
        viewport.style.cursor = 'default';
        keyboardInputBox.style.display = 'none';
        updateStatus('查看模式');
      }
    }

    async function refreshPage() {
      if (!currentBrowserId) { alert('请先选择一个浏览器'); return; }
      try {
        updateStatus('正在刷新页面...');
        const response = await fetch(`${API_BASE}/api/browser/${currentBrowserId}/evaluate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ script: 'location.reload()' })
        });
        const result = await response.json();
        if (result.success) {
          setTimeout(() => takeScreenshot(), 1000);
          updateStatus('页面已刷新');
        }
      } catch (error) {
        console.error('刷新失败:', error);
        alert('刷新失败：' + error.message);
      }
    }

    function toggleScriptEditor() {
      const editor = document.getElementById('scriptEditor');
      editor.style.display = editor.style.display === 'none' ? 'block' : 'none';
    }

    function updateViewportRect() {
      const viewport = document.getElementById('viewport');
      if (viewport && viewportImg) viewportRect = viewport.getBoundingClientRect();
    }

    function addConsoleLog(type, text) {
      const consolePanel = document.getElementById('consolePanel');
      const emptyState = consolePanel.querySelector('.empty-state');
      if (emptyState) emptyState.remove();
      const logEntry = document.createElement('div');
      logEntry.className = `console-log ${type}`;
      logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
      consolePanel.appendChild(logEntry);
      consolePanel.scrollTop = consolePanel.scrollHeight;
    }

    // 添加系统日志（浏览器/标签页事件）
    function addSystemLog(eventType, browserId, message, extra = '') {
      const consolePanel = document.getElementById('consolePanel');
      const emptyState = consolePanel.querySelector('.empty-state');
      if (emptyState) emptyState.remove();
      
      const timestamp = new Date().toLocaleTimeString();
      
      const eventConfig = {
        'browser-start': { icon: '🚀', label: '浏览器启动', color: 'log' },
        'browser-stop': { icon: '🛑', label: '浏览器停止', color: 'error' },
        'page-load': { icon: '📄', label: '页面加载', color: 'log' },
        'page-close': { icon: '❌', label: '页面关闭', color: 'warn' },
        'page-new': { icon: '➕', label: '新建标签页', color: 'log' },
        'page-manual-close': { icon: '🗑️', label: '关闭标签页', color: 'warn' },
        'page-navigate': { icon: '🌐', label: '访问网页', color: 'log' }
      }[eventType] || { icon: 'ℹ️', label: '系统事件', color: 'log' };
      
      const logEntry = document.createElement('div');
      logEntry.className = `console-log ${eventConfig.color}`;
      logEntry.innerHTML = `
        <span style="display:flex;align-items:center;gap:8px;">
          <span>${eventConfig.icon}</span>
          <span><strong>${eventConfig.label}</strong> [${browserId}] ${message}${extra ? ' - ' + extra : ''}</span>
          <span style="color:#888;font-size:11px;margin-left:auto;">${timestamp}</span>
        </span>
      `;
      
      consolePanel.appendChild(logEntry);
      consolePanel.scrollTop = consolePanel.scrollHeight;
    }

    function clearConsole() {
      document.getElementById('consolePanel').innerHTML = '<div class="empty-state"><p>暂无日志</p></div>';
    }

    function updateStatus(text) {
      document.getElementById('statusInfo').textContent = text;
    }

    async function sendKeyboardInput(text) {
      try {
        updateStatus('正在输入...');
        const response = await fetch(`${API_BASE}/api/browser/${currentBrowserId}/type`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, delay: 50 })
        });
        const result = await response.json();
        if (result.success) {
          updateFrame(result.screenshot);
          updateStatus(`已输入：${text}`);
          // 添加输入截图日志
          addTypeLog(result.screenshot, text);
        } else {
          alert('输入失败：' + result.error);
        }
      } catch (error) {
        console.error('输入失败:', error);
        alert('输入失败：' + error.message);
      }
    }

    // 添加输入日志记录
    function addTypeLog(base64Data, text) {
      const consolePanel = document.getElementById('consolePanel');
      const emptyState = consolePanel.querySelector('.empty-state');
      if (emptyState) emptyState.remove();
      
      const timestamp = new Date().toLocaleTimeString();
      const sizeKB = (base64Data.length / 1024).toFixed(1);
      const displayText = text.length > 20 ? text.substring(0, 20) + '...' : text;
      
      const logEntry = document.createElement('div');
      logEntry.className = 'console-log log';
      logEntry.style.cursor = 'pointer';
      logEntry.innerHTML = `
        <span style="display:flex;align-items:center;gap:8px;">
          <span>⌨️</span>
          <span><strong>输入完成</strong> "${displayText}" - ${sizeKB} KB</span>
          <span style="color:#888;font-size:11px;">${timestamp}</span>
          <span style="margin-left:auto;color:#00d9ff;font-size:12px;">🔍 点击查看</span>
        </span>
      `;
      
      logEntry.onclick = () => showScreenshotModal(base64Data, timestamp);
      consolePanel.appendChild(logEntry);
      consolePanel.scrollTop = consolePanel.scrollHeight;
    }

    document.addEventListener('DOMContentLoaded', () => {
      initSocket();
      refreshBrowsers();
      document.getElementById('urlInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') navigate(); });
      document.getElementById('keyboardInput').addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && currentTool === 'keyboard') {
          const text = e.target.value;
          if (text && currentBrowserId) {
            e.target.value = '';
            await sendKeyboardInput(text);
          }
        }
      });
      window.addEventListener('resize', updateViewportRect);
    });
  </script>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
</body>
</html>
