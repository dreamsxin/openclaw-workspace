<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔍 浏览器调试工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 30px 0; border-bottom: 1px solid #333; margin-bottom: 30px; }
    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .controls { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 217, 255, 0.3); }
    .btn-primary { background: linear-gradient(135deg, #00d9ff, #0099cc); color: white; }
    .btn-success { background: linear-gradient(135deg, #00ff88, #00cc6a); color: #1a1a2e; }
    .btn-danger { background: linear-gradient(135deg, #ff4757, #ff3344); color: white; }
    .btn-secondary { background: #333; color: #eee; border: 1px solid #555; }
    .main-grid { display: grid; grid-template-columns: 300px 1fr 300px; gap: 20px; margin-top: 20px; }
    .panel {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .panel h2 { font-size: 1.3em; margin-bottom: 15px; color: #00d9ff; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .browser-list { list-style: none; }
    .browser-item {
      background: rgba(0, 217, 255, 0.1);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s;
      border-left: 3px solid #00d9ff;
    }
    .browser-item:hover { background: rgba(0, 217, 255, 0.2); transform: translateX(5px); }
    .browser-item.active { background: rgba(0, 217, 255, 0.3); border-left-width: 5px; }
    .browser-item .browser-id { font-weight: bold; color: #00ff88; }
    .browser-item .browser-type { font-size: 0.85em; color: #888; }
    .viewport {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      min-height: 500px;
      position: relative;
    }
    .viewport img { width: 100%; height: auto; display: block; }
    .viewport-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 500px;
      color: #666;
      font-size: 1.2em;
    }
    .console-panel {
      max-height: 500px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
    .console-log { padding: 5px 10px; margin-bottom: 5px; border-radius: 4px; border-left: 3px solid; }
    .console-log.log { background: rgba(0, 217, 255, 0.1); border-left-color: #00d9ff; }
    .console-log.error { background: rgba(255, 71, 87, 0.1); border-left-color: #ff4757; }
    .console-log.warn { background: rgba(255, 193, 7, 0.1); border-left-color: #ffc107; }
    .url-bar { display: flex; gap: 10px; margin-bottom: 15px; }
    .url-bar input {
      flex: 1;
      padding: 10px 15px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
      font-size: 14px;
    }
    .url-bar input:focus { outline: none; border-color: #00d9ff; }
    .toolbar {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      flex-wrap: wrap;
    }
    .toolbar-btn {
      padding: 8px 16px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #2a2a3e;
      color: #eee;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .toolbar-btn:hover { background: #3a3a4e; border-color: #00d9ff; }
    .toolbar-btn.active { background: linear-gradient(135deg, #00d9ff, #0099cc); border-color: #00d9ff; color: white; }
    .toolbar-divider { width: 1px; background: #444; margin: 0 5px; }
    .viewport.interactive { cursor: crosshair; position: relative; }
    .viewport.interactive:hover { box-shadow: 0 0 20px rgba(0, 217, 255, 0.3); }
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid #333;
      margin-top: 20px;
      font-size: 0.9em;
      color: #888;
    }
    .status-indicator { display: flex; align-items: center; gap: 8px; }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00ff88;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .script-editor {
      width: 100%;
      height: 100px;
      background: #1a1a2e;
      border: 1px solid #444;
      border-radius: 8px;
      color: #eee;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 10px;
      resize: vertical;
    }
    .script-editor:focus { outline: none; border-color: #00d9ff; }
    .empty-state { text-align: center; padding: 50px; color: #666; }
    .empty-state h3 { margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔍 浏览器调试工具</h1>
      <p>基于 Node.js + Playwright 的可视化远程浏览器调试</p>
    </header>

    <div class="controls">
      <button class="btn-primary" onclick="launchBrowser('chromium')">🚀 启动 Chromium</button>
      <button class="btn-primary" onclick="launchBrowser('firefox')">🦊 启动 Firefox</button>
      <button class="btn-primary" onclick="launchBrowser('webkit')">🌐 启动 WebKit</button>
      <button class="btn-secondary" onclick="refreshBrowsers()">🔄 刷新列表</button>
      <div style="display:flex;gap:10px;">
        <label style="display:flex;align-items:center;gap:8px;background:#333;padding:10px 16px;border-radius:8px;cursor:pointer;">
          <input type="checkbox" id="headlessToggle" style="width:18px;height:18px;cursor:pointer;">
          <span style="color:#eee;font-size:14px;">🪟 有头</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#00d9ff,#0099cc);padding:10px 16px;border-radius:8px;cursor:pointer;" title="仅 Chromium 有效">
          <input type="checkbox" id="screencastToggle" checked style="width:18px;height:18px;cursor:pointer;">
          <span style="color:#fff;font-size:14px;font-weight:600;">⚡ CDP 加速</span>
        </label>
      </div>
    </div>

    <div class="main-grid">
      <div class="panel">
        <h2>📦 浏览器实例</h2>
        <ul class="browser-list" id="browserList">
          <div class="empty-state"><h3>暂无浏览器</h3><p>点击上方按钮启动浏览器</p></div>
        </ul>
        <div id="browserControls" style="display: none; margin-top: 15px;">
          <button class="btn-danger" onclick="closeBrowser()" style="width: 100%;">❌ 关闭选中浏览器</button>
        </div>
      </div>

      <div class="panel">
        <h2>🖥️ 浏览器视图</h2>
        <div class="url-bar">
          <input type="text" id="urlInput" placeholder="输入网址，例如：https://example.com">
          <button class="btn-success" onclick="navigate()">访问</button>
        </div>
        
        <div class="toolbar">
          <button class="toolbar-btn active" id="btnView" onclick="setTool('view')" title="查看模式">👁️ 查看</button>
          <button class="toolbar-btn" id="btnMouse" onclick="setTool('mouse')" title="鼠标模式">🖱️ 鼠标</button>
          <button class="toolbar-btn" id="btnKeyboard" onclick="setTool('keyboard')" title="键盘模式">⌨️ 键盘</button>
          <div class="toolbar-divider"></div>
          <button class="toolbar-btn" onclick="takeScreenshot()" title="截图">📸 截图</button>
          <button class="toolbar-btn" onclick="refreshPage()" title="刷新页面">🔄 刷新</button>
        </div>
        
        <div id="keyboardInputBox" style="display: none; margin: 10px 0;">
          <input type="text" id="keyboardInput" placeholder="输入文字后按回车发送..." style="width: 100%; padding: 10px; border: 1px solid #444; border-radius: 8px; background: #1a1a2e; color: #eee; font-size: 14px;">
        </div>
        
        <div class="viewport" id="viewport">
          <div class="viewport-placeholder">请先选择或启动一个浏览器</div>
        </div>
        <div class="controls" style="margin-top: 15px;">
          <button class="btn-secondary" onclick="toggleScriptEditor()">⚡ 执行脚本</button>
        </div>
        <textarea class="script-editor" id="scriptEditor" placeholder="输入 JavaScript 代码..." style="display: none;"></textarea>
      </div>

      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
          <h2 style="margin:0;border:none;padding:0;">📝 控制台日志</h2>
          <button class="btn-secondary" onclick="clearConsole()" style="padding:6px 12px;font-size:13px;">🗑️ 清除日志</button>
        </div>
        <div class="console-panel" id="consolePanel"><div class="empty-state"><p>暂无日志</p></div></div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-indicator"><div class="status-dot"></div><span>服务器连接正常</span></div>
      <div id="statusInfo">就绪</div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    let currentBrowserId = null;
    let socket = null;
    let currentTool = 'view';
    let viewportImg = null;
    let viewportRect = null;

    function initSocket() {
      try {
        socket = io(window.location.origin, {
          transports: ['websocket', 'polling'],
          reconnection: true,
          reconnectionAttempts: 5,
          reconnectionDelay: 1000
        });
        
        socket.on('connect', () => { console.log('已连接到服务器:', socket.id); updateStatus('已连接'); });
        socket.on('disconnect', () => { console.log('与服务器断开连接'); updateStatus('连接断开'); });
        socket.on('connect_error', (error) => { console.error('Socket.IO 连接错误:', error); updateStatus('连接错误：' + error.message); });
        
        socket.on('console-log', (data) => { console.log('收到控制台日志:', data); addConsoleLog(data.type, data.text); });
        socket.on('page-error', (data) => { console.log('收到页面错误:', data); addConsoleLog('error', data.message); });
        
        socket.on('browser-closed', (data) => {
          console.log('浏览器已关闭:', data);
          if (data.browserId === currentBrowserId) {
            currentBrowserId = null;
            stopFrameStream();
            document.getElementById('viewport').innerHTML = '<div class="viewport-placeholder">浏览器已关闭</div>';
            document.getElementById('browserControls').style.display = 'none';
          }
          refreshBrowsers();
        });

        socket.on('frame', (data) => {
          if (data.browserId === currentBrowserId && data.frame) {
            const mode = data.mode || 'unknown';
            const size = (data.frame.length / 1024).toFixed(1);
            console.log(`收到帧 [${mode}]:`, data.browserId, `${size} KB`);
            updateFrame(data.frame);
          }
        });
      } catch (error) {
        console.error('初始化 Socket.IO 失败:', error);
        updateStatus('Socket.IO 初始化失败');
      }
    }

    function updateFrame(base64Data) {
      console.log('更新画面帧，数据长度:', base64Data.length);
      const viewport = document.getElementById('viewport');
      let img = viewport.querySelector('img');
      
      if (!img) {
        console.log('创建新 img 元素');
        viewport.innerHTML = `<img src="data:image/jpeg;base64,${base64Data}" id="viewportImage" style="width:100%;height:auto;display:block;">`;
        viewportImg = document.getElementById('viewportImage');
        if (viewportImg) {
          console.log('绑定鼠标事件');
          viewportImg.addEventListener('click', handleViewportClick);
          viewportImg.addEventListener('mousemove', handleViewportMouseMove);
          viewportImg.onload = () => { console.log('第一帧画面加载完成'); updateStatus('实时画面传输中 - ' + currentBrowserId); };
          viewportImg.onerror = (e) => { console.error('图片加载失败:', e); };
        }
        updateViewportRect();
      } else {
        img.src = `data:image/jpeg;base64,${base64Data}`;
      }
    }

    function stopFrameStream() {
      if (socket && currentBrowserId) {
        socket.emit('leave-browser', currentBrowserId);
      }
    }

    async function launchBrowser(browserType) {
      try {
        const headless = !document.getElementById('headlessToggle').checked;
        const screencast = document.getElementById('screencastToggle').checked;
        
        const modeText = browserType === 'chromium' 
          ? (screencast ? 'CDP 加速' : '截图模式') 
          : '兼容模式';
        
        updateStatus(`正在启动浏览器... (${headless ? '无头' : '有头'}, ${modeText})`);
        
        const response = await fetch(`${API_BASE}/api/browser/launch`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ browserType, headless, screencast })
        });
        const result = await response.json();
        if (result.success) {
          console.log(`浏览器已启动：${result.browserId}`);
          selectBrowser(result.browserId);
          refreshBrowsers();
          updateStatus(`已启动 ${browserType} (${result.screencast ? '⚡ CDP 10 FPS' : '📸 截图 2 FPS'})`);
        } else {
          alert('启动失败：' + result.error);
        }
      } catch (error) {
        console.error('启动浏览器失败:', error);
        alert('启动失败：' + error.message);
      }
    }

    async function refreshBrowsers() {
      try {
        const response = await fetch(`${API_BASE}/api/browsers`);
        const result = await response.json();
        const browserList = document.getElementById('browserList');
        if (result.browsers.length === 0) {
          browserList.innerHTML = '<div class="empty-state"><h3>暂无浏览器</h3><p>点击上方按钮启动浏览器</p></div>';
          document.getElementById('browserControls').style.display = 'none';
        } else {
          browserList.innerHTML = result.browsers.map(b => `
            <li class="browser-item ${b.id === currentBrowserId ? 'active' : ''}" onclick="selectBrowser('${b.id}')">
              <div class="browser-id">${b.id}</div>
              <div class="browser-type">
                ${b.type} 
                ${b.connected ? '🟢' : '🔴'}
                ${b.screencast ? '<span style="background:linear-gradient(135deg,#00d9ff,#0099cc);padding:2px 6px;border-radius:4px;font-size:11px;margin-left:6px;">⚡CDP</span>' : ''}
              </div>
            </li>
          `).join('');
          if (currentBrowserId) document.getElementById('browserControls').style.display = 'block';
        }
      } catch (error) {
        console.error('获取浏览器列表失败:', error);
      }
    }

    function selectBrowser(browserId) {
      if (currentBrowserId && currentBrowserId !== browserId) stopFrameStream();
      currentBrowserId = browserId;
      
      document.querySelectorAll('.browser-item').forEach(item => {
        item.classList.remove('active');
        if (item.querySelector('.browser-id')?.textContent === browserId) item.classList.add('active');
      });
      
      document.getElementById('browserControls').style.display = 'block';
      
      if (socket) {
        socket.emit('join-browser', browserId);
        console.log('加入浏览器房间，启动实时画面流:', browserId);
      }
      
      updateStatus(`已选择：${browserId} - 实时画面传输中`);
      const viewport = document.getElementById('viewport');
      viewport.innerHTML = '<div class="viewport-placeholder">正在加载画面...</div>';
    }

    async function closeBrowser() {
      if (!currentBrowserId) return;
      if (!confirm('确定要关闭这个浏览器吗？')) return;
      try {
        const response = await fetch(`${API_BASE}/api/browser/${currentBrowserId}/close`, { method: 'POST' });
        const result = await response.json();
        if (result.success) {
          stopFrameStream();
          currentBrowserId = null;
          document.getElementById('viewport').innerHTML = '<div class="viewport-placeholder">请先选择或启动一个浏览器</div>';
          document.getElementById('browserControls').style.display = 'none';
          refreshBrowsers();
          updateStatus('浏览器已关闭');
        }
      } catch (error) {
        console.error('关闭浏览器失败:', error);
        alert('关闭失败：' + error.message);
      }
    }

    async function navigate() {
      if (!currentBrowserId) { alert('请先选择一个浏览器'); return; }
      const url = document.getElementById('urlInput').value;
      if (!url) { alert('请输入网址'); return; }
      try {
        updateStatus('正在加载页面...');
        const response = await fetch(`${API_BASE}/api/browser/${currentBrowserId}/navigate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const result = await response.json();
        if (result.success) {
          updateStatus(`已加载：${result.title || url}`);
        } else {
          alert('导航失败：' + result.error);
        }
      } catch (error) {
        console.error('导航失败:', error);
        alert('导航失败：' + error.message);
      }
    }

    async function takeScreenshot() {
      if (!currentBrowserId) { alert('请先选择一个浏览器'); return; }
      try {
        updateStatus('正在捕获高清截图...');
        const response = await fetch(`${API_BASE}/api/browser/${currentBrowserId}/screenshot`, { method: 'POST' });
        const result = await response.json();
        if (result.success) {
          const viewport = document.getElementById('viewport');
          viewport.innerHTML = `<img src="data:image/png;base64,${result.screenshot}" alt="浏览器截图" id="viewportImage">`;
          viewportImg = document.getElementById('viewportImage');
          if (viewportImg) {
            viewportImg.addEventListener('click', handleViewportClick);
            viewportImg.addEventListener('mousemove', handleViewportMouseMove);
          }
          updateViewportRect();
          updateStatus('高清截图已捕获');
        }
      } catch (error) {
        console.error('截图失败:', error);
        alert('截图失败：' + error.message);
      }
    }

    async function handleViewportClick(event) {
      if (currentTool !== 'mouse' || !currentBrowserId) return;
      if (!viewportRect) updateViewportRect();
      
      // 获取点击相对于 viewport 容器的坐标
      const clickX = event.clientX - viewportRect.left;
      const clickY = event.clientY - viewportRect.top;
      
      // 获取图片实际显示尺寸（考虑缩放）
      const img = document.getElementById('viewportImage');
      if (!img) return;
      
      const imgRect = img.getBoundingClientRect();
      const imgDisplayWidth = imgRect.width;
      const imgDisplayHeight = imgRect.height;
      
      // 计算图片在容器中的偏移
      const imgOffsetX = imgRect.left - viewportRect.left;
      const imgOffsetY = imgRect.top - viewportRect.top;
      
      // 确保点击在图片范围内
      if (clickX < imgOffsetX || clickX > imgOffsetX + imgDisplayWidth ||
          clickY < imgOffsetY || clickY > imgOffsetY + imgDisplayHeight) {
        console.log('点击不在图片范围内');
        return;
      }
      
      // 计算相对于图片的点击位置（0-1 之间）
      const relativeX = (clickX - imgOffsetX) / imgDisplayWidth;
      const relativeY = (clickY - imgOffsetY) / imgDisplayHeight;
      
      // 浏览器 viewport 尺寸（1280x720）
      const browserWidth = 1280;
      const browserHeight = 720;
      
      // 转换为浏览器实际坐标
      const browserX = Math.round(relativeX * browserWidth);
      const browserY = Math.round(relativeY * browserHeight);
      
      console.log(`点击：显示尺寸=${imgDisplayWidth}x${imgDisplayHeight}, 相对位置=(${relativeX.toFixed(3)}, ${relativeY.toFixed(3)}), 浏览器坐标=(${browserX}, ${browserY})`);
      
      try {
        updateStatus(`正在执行点击... (${browserX}, ${browserY})`);
        const response = await fetch(`${API_BASE}/api/browser/${currentBrowserId}/click`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ x: browserX, y: browserY, button: 'left', clickCount: 1 })
        });
        const result = await response.json();
        if (result.success) {
          updateFrame(result.screenshot);
          updateStatus(`已点击：(${browserX}, ${browserY})`);
        } else {
          alert('点击失败：' + result.error);
        }
      } catch (error) {
        console.error('点击失败:', error);
        alert('点击失败：' + error.message);
      }
    }

    function handleViewportMouseMove(event) {
      if (currentTool !== 'mouse' || !currentBrowserId) return;
      if (!viewportRect) updateViewportRect();
      
      // 获取图片实际显示尺寸
      const img = document.getElementById('viewportImage');
      if (!img) return;
      
      const imgRect = img.getBoundingClientRect();
      const clickX = event.clientX - viewportRect.left;
      const clickY = event.clientY - viewportRect.top;
      const imgOffsetX = imgRect.left - viewportRect.left;
      const imgOffsetY = imgRect.top - viewportRect.top;
      
      // 计算相对位置
      const relativeX = (clickX - imgOffsetX) / imgRect.width;
      const relativeY = (clickY - imgOffsetY) / imgRect.height;
      const browserX = Math.round(relativeX * 1280);
      const browserY = Math.round(relativeY * 720);
      
      // 更新状态栏显示当前鼠标位置
      updateStatus(`鼠标位置：(${browserX}, ${browserY})`);
    }

    function setTool(tool) {
      currentTool = tool;
      document.querySelectorAll('.toolbar-btn').forEach(btn => btn.classList.remove('active'));
      const btnId = `btn${tool.charAt(0).toUpperCase() + tool.slice(1)}`;
      const btn = document.getElementById(btnId);
      if (btn) btn.classList.add('active');
      
      const viewport = document.getElementById('viewport');
      const keyboardInputBox = document.getElementById('keyboardInputBox');
      
      if (tool === 'mouse') {
        viewport.classList.add('interactive');
        keyboardInputBox.style.display = 'none';
        updateStatus('鼠标模式：在截图上点击执行操作');
      } else if (tool === 'keyboard') {
        viewport.classList.remove('interactive');
        keyboardInputBox.style.display = 'block';
        document.getElementById('keyboardInput').focus();
        updateStatus('键盘模式：输入文字发送到浏览器');
      } else {
        viewport.classList.remove('interactive');
        keyboardInputBox.style.display = 'none';
        updateStatus('查看模式');
      }
    }

    async function refreshPage() {
      if (!currentBrowserId) { alert('请先选择一个浏览器'); return; }
      try {
        updateStatus('正在刷新页面...');
        const response = await fetch(`${API_BASE}/api/browser/${currentBrowserId}/evaluate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ script: 'location.reload()' })
        });
        const result = await response.json();
        if (result.success) {
          setTimeout(() => takeScreenshot(), 1000);
          updateStatus('页面已刷新');
        }
      } catch (error) {
        console.error('刷新失败:', error);
        alert('刷新失败：' + error.message);
      }
    }

    function toggleScriptEditor() {
      const editor = document.getElementById('scriptEditor');
      editor.style.display = editor.style.display === 'none' ? 'block' : 'none';
    }

    function updateViewportRect() {
      const viewport = document.getElementById('viewport');
      if (viewport && viewportImg) viewportRect = viewport.getBoundingClientRect();
    }

    function addConsoleLog(type, text) {
      const consolePanel = document.getElementById('consolePanel');
      const emptyState = consolePanel.querySelector('.empty-state');
      if (emptyState) emptyState.remove();
      const logEntry = document.createElement('div');
      logEntry.className = `console-log ${type}`;
      logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
      consolePanel.appendChild(logEntry);
      consolePanel.scrollTop = consolePanel.scrollHeight;
    }

    function clearConsole() {
      document.getElementById('consolePanel').innerHTML = '<div class="empty-state"><p>暂无日志</p></div>';
    }

    function updateStatus(text) {
      document.getElementById('statusInfo').textContent = text;
    }

    async function sendKeyboardInput(text) {
      try {
        updateStatus('正在输入...');
        const response = await fetch(`${API_BASE}/api/browser/${currentBrowserId}/type`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, delay: 50 })
        });
        const result = await response.json();
        if (result.success) {
          updateFrame(result.screenshot);
          updateStatus(`已输入：${text}`);
        } else {
          alert('输入失败：' + result.error);
        }
      } catch (error) {
        console.error('输入失败:', error);
        alert('输入失败：' + error.message);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      initSocket();
      refreshBrowsers();
      document.getElementById('urlInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') navigate(); });
      document.getElementById('keyboardInput').addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && currentTool === 'keyboard') {
          const text = e.target.value;
          if (text && currentBrowserId) {
            e.target.value = '';
            await sendKeyboardInput(text);
          }
        }
      });
      window.addEventListener('resize', updateViewportRect);
    });
  </script>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
</body>
</html>
